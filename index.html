<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="apple-touch-icon" sizes="180x180" href="skull-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="XINEMAX">
    
    <title>XINEMAX - Freemium Stream Ecosystem</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --brand-color: #8B5CF6; 
            --brand-glow: rgba(139, 92, 246, 0.5);
            --bg-deep: #0B0B0F;     
            --card-bg: #13131A;
            --nav-bg: rgba(11, 11, 15, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb {
            background: #252532;
            border-radius: 5px;
            border: 2px solid var(--bg-deep);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--brand-color);
            box-shadow: 0 0 10px var(--brand-glow);
        }

        body {
            background-color: var(--bg-deep);
            color: #F3F4F6;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            padding-top: 90px;
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
        }




/* --- KİLİT EKRANI STİLLERİ --- */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.65);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 999999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .lock-box {
            background: rgba(20, 20, 28, 0.6);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 40px rgba(139, 92, 246, 0.15);
            color: white;
            max-width: 320px;
            width: 100%;
        }
        .lock-box h2 {
            margin-bottom: 25px;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #fff, var(--brand-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .lock-box input {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 0 auto 20px auto;
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .lock-box input:focus {
            border-color: var(--brand-color);
            box-shadow: 0 0 15px var(--brand-glow);
            background: rgba(255,255,255,0.08);
        }
        .lock-box button {
            width: 100%;
            padding: 14px;
            background: var(--brand-color);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--brand-glow);
        }
        .lock-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--brand-color);
        }
        #lock-error {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            font-weight: 500;
        }




        .ambient-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.25);
            transform: scale(1.05);
            z-index: -1;
            transition: background-image 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 75px;
            background-color: var(--nav-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(45deg, #fff, var(--brand-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            user-select: none;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-grow: 0.4;
            justify-content: flex-end;
            max-width: 600px;
        }

        .search-container {
            flex-grow: 1;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 18px;
            border-radius: 30px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .search-input:focus {
            border-color: var(--brand-color);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px var(--brand-glow);
        }

        .dropdown-container {
            position: relative;
            min-width: 160px;
        }

        .dropdown-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 18px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            outline: none;
            transition: all 0.3s ease;
        }

        .dropdown-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .dropdown-btn .material-icons-round {
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .dropdown-container.open .dropdown-btn .material-icons-round {
            transform: rotate(180deg);
        }

        .dropdown-list {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            left: 0;
            background: #13131A;
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            max-height: 280px;
            overflow-y: auto;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            display: none;
            z-index: 1100;
        }

        .dropdown-container.open .dropdown-list {
            display: block;
        }

        .dropdown-item {
            padding: 12px 18px;
            font-size: 14px;
            color: #9CA3AF;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .dropdown-item.active {
            background: var(--brand-color);
            color: white;
        }

        .status-message {
            text-align: center;
            padding: 40px;
            font-size: 1rem;
            color: #9CA3AF;
        }

        .player-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 2000;
            overflow: hidden; 
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .player-loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0B0B0F;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .pixel-skull-crossbones {
            width: 112px;
            height: 96px;
            position: relative;
            animation: skullFloat 2s ease-in-out infinite;
        }
        
        .pixel-skull-crossbones::before {
            content: "";
            position: absolute;
            width: 8px;
            height: 8px;
            background: transparent;
            box-shadow: 
                0px 0px #fff, 8px 0px #fff, 0px 8px #fff, 8px 8px #fff,
                96px 0px #fff, 104px 0px #fff, 96px 8px #fff, 104px 8px #fff,
                16px 16px #fff, 24px 24px #fff,
                88px 16px #fff, 80px 24px #fff,
                48px 8px #fff, 56px 8px #fff, 64px 8px #fff,
                40px 16px #fff, 48px 16px #fff, 56px 16px #fff, 64px 16px #fff, 72px 16px #fff,
                32px 24px #fff, 40px 24px #fff, 48px 24px #fff, 56px 24px #fff, 64px 24px #fff, 72px 24px #fff, 80px 24px #fff,
                24px 32px #fff, 32px 32px #fff, 80px 32px #fff, 88px 32px #fff,
                24px 40px #fff, 88px 40px #fff,
                24px 48px #fff, 48px 48px #fff, 64px 48px #fff, 88px 48px #fff,
                32px 56px #fff, 40px 56px #fff, 56px 56px #fff, 72px 56px #fff, 80px 56px #fff,
                40px 64px #fff, 48px 64px #fff, 56px 64px #fff, 64px 64px #fff, 72px 64px #fff,
                48px 72px #fff, 56px 72px #fff, 64px 72px #fff,
                48px 80px #fff, 64px 80px #fff,
                24px 64px #fff, 16px 72px #fff,
                80px 64px #fff, 88px 72px #fff,
                0px 80px #fff, 8px 80px #fff, 0px 88px #fff, 8px 88px #fff,
                96px 80px #fff, 104px 80px #fff, 96px 88px #fff, 104px 88px #fff;
        }

        .pixel-skull-crossbones::after {
            content: "";
            position: absolute;
            width: 8px;
            height: 8px;
            background: transparent;
            box-shadow: 40px 40px var(--brand-color), 72px 40px var(--brand-color);
            animation: eyeGlow 1.5s ease-in-out infinite alternate;
        }

        @keyframes skullFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.05); }
        }

        @keyframes eyeGlow {
            0% { 
                box-shadow: 40px 40px var(--brand-color), 72px 40px var(--brand-color);
                filter: drop-shadow(0 0 2px var(--brand-color));
            }
            100% { 
                box-shadow: 40px 40px #A78BFA, 72px 40px #A78BFA;
                filter: drop-shadow(0 0 12px var(--brand-color));
            }
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .player-title {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 15;
            padding: 10px 20px;
            background: rgba(19, 19, 26, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #E5E7EB;
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }

        .close-player-btn, .close-details-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 15;
            background: rgba(19, 19, 26, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .close-player-btn:hover, .close-details-btn:hover {
            background: var(--brand-color);
            box-shadow: 0 0 15px var(--brand-glow);
            transform: scale(1.1);
        }

        main {
            padding: 0 5% 60px 5%;
            position: relative;
            z-index: 5;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-out {
            opacity: 0 !important;
            transform: translateY(20px);
            pointer-events: none;
        }
        
        .hidden-header {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
        }

        h2 {
            font-size: 1.4rem;
            margin-top: 30px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #E5E7EB;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            padding: 15px 0;
        }

        .movie-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }

        .movie-card:hover {
            transform: translateY(-6px);
            border-color: transparent;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.6), 0 0 25px rgba(139, 92, 246, 0.45);
        }

        .movie-thumb {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background: #1A1A24;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4B5563;
            font-size: 2.2rem;
        }

        .movie-info {
            padding: 14px;
            background: #13131A;
        }

        .movie-title {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #E5E7EB;
        }

        #infinite-loading {
            text-align: center;
            padding: 30px;
            font-size: 0.95rem;
            color: var(--brand-color);
            font-weight: 600;
            display: none;
        }

        /* FULLSCREEN DETAY SAYFASI TASARIMI */
        .details-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-deep);
            z-index: 1500;
            overflow-y: auto;
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .details-page.active {
            display: block;
            opacity: 1;
        }

        .details-hero {
            position: relative;
            width: 100%;
            min-height: 50vh;
            background-size: cover;
            background-position: center top;
            display: flex;
            align-items: flex-end;
            padding: 40px 5%;
            box-sizing: border-box;
        }

        .details-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(11,11,15,0.2) 0%, rgba(11,11,15,0.95) 100%);
            z-index: 1;
        }

        .details-hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 30px;
            align-items: flex-end;
            width: 100%;
            flex-wrap: wrap;
        }

        .details-poster {
            width: 220px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 1px solid var(--glass-border);
            background: #13131A;
        }

        .details-meta {
            flex: 1;
            min-width: 300px;
        }

        .details-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .details-sub-meta {
            display: flex;
            gap: 15px;
            color: #9CA3AF;
            font-size: 0.9rem;
            margin-bottom: 20px;
            align-items: center;
        }

        .details-rating {
            background: rgba(245, 158, 11, 0.15);
            color: #F59E0B;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .play-now-btn {
            background: var(--brand-color);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px var(--brand-glow);
            transition: all 0.3s ease;
        }

        .play-now-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px var(--brand-glow);
            background: #7C3AED;
        }

        .trailer-link-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #E5E7EB;
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .trailer-link-btn:hover {
            background: #FF0000;
            color: white;
            border-color: transparent;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        .details-body {
            padding: 40px 5%;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 50px;
            box-sizing: border-box;
        }

        @media (max-width: 900px) {
            .details-body { grid-template-columns: 1fr; gap: 30px; }
            .details-hero-content { justify-content: center; text-align: center; }
            .details-sub-meta { justify-content: center; }
            .details-hero { align-items: center; }
        }

        .info-section h3 {
            font-size: 1.2rem;
            border-left: 4px solid var(--brand-color);
            padding-left: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-section p {
            color: #D1D5DB;
            line-height: 1.7;
            font-size: 1rem;
        }

        .cast-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        .cast-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.02);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }

        .cast-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            background: #252532;
        }

        .cast-name { font-weight: 600; font-size: 0.9rem; }
        .cast-character { color: #6B7280; font-size: 0.8rem; margin-top: 2px;}
    </style>
</head>
<body>



    <!-- KİLİT EKRANI -->
    <div id="lock-screen">
        <div class="lock-box">
            <h2>XINEMAX</h2><h4>by downer<h4>
            <input type="password" id="lock-input" placeholder="Şifreyi Girin" maxlength="6" autofocus>
            <button onclick="checkPassword()">Giriş Yap</button>
            <div id="lock-error">Hatalı Şifre!</div>
        </div>
    </div>

    <div id="ambient-bg" class="ambient-background"></div>

    <header id="main-header">
        <div class="logo" id="logo-btn">XINEMAX</div>
        <div class="header-actions">
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Sistem senkronize ediliyor..." disabled />
            </div>
            <div class="dropdown-container" id="dropdown-container">
                <button class="dropdown-btn" id="dropdown-btn" disabled>
                    <span id="selected-category-text">Kategoriler</span>
                    <span class="material-icons-round">expand_more</span>
                </button>
                <div class="dropdown-list" id="dropdown-list"></div>
            </div>
        </div>
    </header>

    <!-- FULLSCREEN DETAY SAYFASI -->
    <div class="details-page" id="details-page">
        <div class="close-details-btn" id="close-details-btn">
            <span class="material-icons-round">arrow_back</span>
        </div>
        <div id="details-dynamic-content"></div>
    </div>

    <div class="player-container" id="player-container">
        <div class="player-title" id="current-title">Film Yükleniyor</div>
        <div class="close-player-btn" id="close-player-btn">
            <span class="material-icons-round">close</span>
        </div>
        <div class="video-wrapper">
            <div class="player-loader-overlay" id="player-loader">
                <div class="pixel-skull-crossbones"></div>
            </div>
            <iframe id="player-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <main id="main-content">
        <div id="status" class="status-message">İçerikler yükleniyor, lütfen bekleyin...</div>
        
        <h2 id="section-title" style="display:none;">TÜM FİLMLER</h2>
        <div class="movie-grid" id="movie-grid"></div>
        
        <div id="infinite-loading">Veri blokları aktarılıyor...</div>
    </main>

    <script>

// --- ŞİFRE KONTROL MEKANİZMASI ---
        function checkPassword() {
            const input = document.getElementById('lock-input');
            const errorDiv = document.getElementById('lock-error');
            
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            
            // MixPUD dinamik saat formülü mantığı
            const secretKey = (hours * 10000) + (minutes * 100);
            
            if (Number(input.value) === secretKey) {
                document.getElementById('lock-screen').style.display = 'none';
                // Giriş başarılı olunca M3U verisini çekmeye başla
                fetchM3UList();
            } else {
                errorDiv.style.display = 'block';
                input.value = '';
                input.focus();
            }
        }

        // Enter tuşu ile giriş tetikleyici
        document.getElementById('lock-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });


        
        const M3U_URL = "https://tv606.github.io/xinemax/listx.m3u";
        // SADECE BU ADRESTE ÇALIŞAN TMDB API KEY
        const TMDB_API_KEY = "43ddba9df87b2636f3c27ec9f382c85f"; 
        
        let allMovies = [];      
        let filteredMovies = []; 
        let activeCategory = "Tümü";
        
        const ITEMS_PER_PAGE = 40; 
        let currentPage = 1;
        let isLodingMore = false;

        const logoBtn = document.getElementById('logo-btn');
        const ambientBg = document.getElementById('ambient-bg');
        const movieGrid = document.getElementById('movie-grid');
        const searchInput = document.getElementById('search-input');
        const statusDiv = document.getElementById('status');
        const sectionTitle = document.getElementById('section-title');
        
        const dropdownContainer = document.getElementById('dropdown-container');
        const dropdownBtn = document.getElementById('dropdown-btn');
        const dropdownList = document.getElementById('dropdown-list');
        const selectedCategoryText = document.getElementById('selected-category-text');
        
        const playerContainer = document.getElementById('player-container');
        const playerIframe = document.getElementById('player-iframe');
        const currentTitle = document.getElementById('current-title');
        const infiniteLoading = document.getElementById('infinite-loading');

        const mainHeader = document.getElementById('main-header');
        const mainContent = document.getElementById('main-content');
        const closePlayerBtn = document.getElementById('close-player-btn');
        const loaderOverlay = document.getElementById('player-loader');

        // Detay Sayfası Elemanları
        const detailsPage = document.getElementById('details-page');
        const closeDetailsBtn = document.getElementById('close-details-btn');
        const detailsDynamicContent = document.getElementById('details-dynamic-content');

        window.addEventListener('DOMContentLoaded', fetchM3UList);
        logoBtn.addEventListener('click', resetToHome);
        closePlayerBtn.addEventListener('click', closeVideoPlayer);
        closeDetailsBtn.addEventListener('click', closeDetailsPage);

        playerIframe.addEventListener('load', () => {
            loaderOverlay.style.opacity = '0';
            setTimeout(() => {
                loaderOverlay.style.display = 'none';
            }, 500);
        });

        dropdownBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownContainer.classList.toggle('open');
        });

        document.addEventListener('click', () => {
            dropdownContainer.classList.remove('open');
        });

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function resetToHome() {
            searchInput.value = "";
            activeCategory = "Tümü";
            selectedCategoryText.textContent = "Kategoriler";
            updateDropdownSelection();
            
            filteredMovies = shuffleArray([...allMovies]);
            sectionTitle.textContent = "TÜM FİLMLER";
            
            closeVideoPlayer();
            closeDetailsPage();
            
            currentPage = 1;
            movieGrid.innerHTML = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderNextPage();
        }

        function closeVideoPlayer() {
            playerContainer.style.display = 'none';
            playerIframe.src = "";
            document.body.style.overflow = detailsPage.classList.contains('active') ? 'hidden' : 'auto';
        }

        function closeDetailsPage() {
            detailsPage.classList.remove('active');
            mainContent.classList.remove('fade-out');
            mainHeader.classList.remove('hidden-header');
            document.body.style.overflow = 'auto';
            detailsDynamicContent.innerHTML = '';
        }

        async function fetchM3UList() {
            try {
                const response = await fetch(M3U_URL);
                if (!response.ok) throw new Error("Veri çekilemedi.");
                const data = await response.text();
                
                allMovies = parseAndUniqueM3U(data);
                filteredMovies = shuffleArray([...allMovies]);
                
                buildDropdownMenu();
                
                statusDiv.style.display = 'none';
                sectionTitle.style.display = 'block';
                searchInput.disabled = false;
                dropdownBtn.disabled = false;
                searchInput.placeholder = `${allMovies.length.toLocaleString('tr-TR')} film arasından ara...`;

                renderNextPage();
                window.addEventListener('scroll', handleScroll);
            } catch (error) {
                statusDiv.textContent = "Bağlantı hatası: M3U listesi yüklenemedi.";
                console.error(error);
            }
        }

        function parseAndUniqueM3U(data) {
            const lines = data.split('\n');
            const playlist = [];
            const seenUrls = new Set(); 
            const seenTitles = new Set(); 
            
            let currentItem = null;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();

                if (line.startsWith('#EXTINF:')) {
                    currentItem = {};
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    if (logoMatch) currentItem.logo = logoMatch[1];

                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentItem.category = groupMatch ? groupMatch[1].trim() : "Diğer";

                    const commaIndex = line.lastIndexOf(',');
                    if (commaIndex !== -1) {
                        currentItem.title = line.substring(commaIndex + 1).trim() || "Bilinmeyen Başlık";
                    } else {
                        currentItem.title = "Bilinmeyen Başlık";
                    }
                } else if (line.startsWith('http') && currentItem) {
                    currentItem.url = line;
                    if (!seenUrls.has(currentItem.url) && !seenTitles.has(currentItem.title.toLowerCase())) {
                        seenUrls.add(currentItem.url);
                        seenTitles.add(currentItem.title.toLowerCase());
                        playlist.push(currentItem);
                    }
                    currentItem = null; 
                }
            }
            return playlist;
        }

        function buildDropdownMenu() {
            const categories = new Set();
            allMovies.forEach(m => {
                if(m.category && m.category !== "Diğer" && m.category !== "Son Eklenenler" && m.category !== "Türk Yapımı") {
                    categories.add(m.category);
                }
            });

            const sortedCategories = Array.from(categories).sort((a, b) => a.localeCompare(b, 'tr'));
            const finalCategories = ["Tümü", ...sortedCategories];
            if (allMovies.some(m => m.category === "Diğer")) {
                finalCategories.push("Diğer");
            }

            dropdownList.innerHTML = "";
            finalCategories.forEach(cat => {
                const item = document.createElement('div');
                item.className = `dropdown-item ${cat === activeCategory ? 'active' : ''}`;
                item.textContent = cat;
                item.dataset.category = cat;
                
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectCategory(cat);
                    dropdownContainer.classList.remove('open');
                });
                dropdownList.appendChild(item);
            });
        }

        function updateDropdownSelection() {
            const items = dropdownList.querySelectorAll('.dropdown-item');
            items.forEach(item => {
                if (item.dataset.category === activeCategory) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function selectCategory(catName) {
            activeCategory = catName;
            selectedCategoryText.textContent = catName === "Tümü" ? "Kategoriler" : catName;
            updateDropdownSelection();
            searchInput.value = ""; 

            let targetMovies = [];
            if (catName === "Tümü") {
                targetMovies = [...allMovies];
                sectionTitle.textContent = "TÜM FİLMLER";
            } else {
                targetMovies = allMovies.filter(m => m.category === catName);
                sectionTitle.textContent = catName.toUpperCase();
            }

            filteredMovies = shuffleArray(targetMovies);
            
            currentPage = 1;
            movieGrid.innerHTML = '';
            renderNextPage();
        }

        function renderNextPage() {
            if (isLodingMore) return;
            isLodingMore = true;
            infiniteLoading.style.display = 'block';

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const pageItems = filteredMovies.slice(startIndex, endIndex);

            if (pageItems.length === 0) {
                infiniteLoading.style.display = 'none';
                isLodingMore = false;
                return;
            }

            const fragment = document.createDocumentFragment();
            pageItems.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                
                const imgHtml = movie.logo 
                    ? `<img class="movie-thumb" src="${movie.logo}" alt="${movie.title}" loading="lazy" onerror="this.src='https://placehold.co/200x260/13131A/8B5CF6?text=VIDEO'">`
                    : `<div class="movie-thumb">🎞️</div>`;

                card.innerHTML = `
                    ${imgHtml}
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                    </div>
                `;

                card.addEventListener('click', () => showMovieDetailsPage(movie));
                fragment.appendChild(card);
            });

            movieGrid.appendChild(fragment);
            currentPage++;
            infiniteLoading.style.display = 'none';
            isLodingMore = false;
        }

        function handleScroll() {
            if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 300) {
                renderNextPage();
            }
        }

        let searchTimeout;
        searchInput.addEventListener('input', function(e) {
            clearTimeout(searchTimeout);
            const query = e.target.value.toLowerCase().trim();

            searchTimeout = setTimeout(() => {
                let baseList = activeCategory === "Tümü" 
                    ? [...allMovies] 
                    : allMovies.filter(m => m.category === activeCategory);

                if (query === "") {
                    filteredMovies = shuffleArray(baseList);
                } else {
                    filteredMovies = baseList.filter(movie => 
                        movie.title.toLowerCase().includes(query)
                    );
                }
                currentPage = 1;
                movieGrid.innerHTML = '';
                window.scrollTo({ top: 0 });
                renderNextPage();
            }, 250);
        });

        function cleanMovieTitle(title) {
            return title
                .replace(/\(.*?\)/g, '') 
                .replace(/\[.*?\]/g, '') 
                .replace(/1080p|720p|4k|uhd|bluray|web-dl|dual|türkçe|dublaj|altyazılı/gi, '')
                .trim();
        }

        async function showMovieDetailsPage(movie) {
            mainContent.classList.add('fade-out');
            mainHeader.classList.add('hidden-header');
            document.body.style.overflow = 'hidden';

            detailsDynamicContent.innerHTML = `<div class="status-message">Bilgiler yükleniyor, lütfen bekleyin......</div>`;
            detailsPage.classList.add('active');
            detailsPage.scrollTop = 0;

            let tmdbData = null;
            let creditsData = null;
            let videosData = null;

            const cleanTitle = cleanMovieTitle(movie.title);

            try {
                const searchRes = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(cleanTitle)}&language=tr-TR`);
                const searchJson = await searchRes.json();

                if (searchJson.results && searchJson.results.length > 0) {
                    const movieId = searchJson.results[0].id;
                    
                    const [detailRes, creditsRes, videosRes] = await Promise.all([
                        fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${TMDB_API_KEY}&language=tr-TR`),
                        fetch(`https://api.themoviedb.org/3/movie/${movieId}/credits?api_key=${TMDB_API_KEY}&language=tr-TR`),
                        fetch(`https://api.themoviedb.org/3/movie/${movieId}/videos?api_key=${TMDB_API_KEY}&language=tr-TR`)
                    ]);

                    tmdbData = await detailRes.json();
                    creditsData = await creditsRes.json();
                    videosData = await videosRes.json();
                }
            } catch (err) {
                console.error("TMDb API Hatası:", err);
            }

            const title = tmdbData ? tmdbData.title : movie.title;
            const overview = tmdbData && tmdbData.overview ? tmdbData.overview : "Bu film için özet bilgi bulunamadı.";
            const poster = tmdbData && tmdbData.poster_path ? `https://image.tmdb.org/t/p/w500${tmdbData.poster_path}` : (movie.logo || 'https://placehold.co/200x260/13131A/8B5CF6?text=VIDEO');
            const backdrop = tmdbData && tmdbData.backdrop_path ? `https://image.tmdb.org/t/p/original${tmdbData.backdrop_path}` : '';
            const rating = tmdbData ? tmdbData.vote_average.toFixed(1) : 'N/A';
            const releaseYear = tmdbData && tmdbData.release_date ? tmdbData.release_date.split('-')[0] : 'Bilinmiyor';
            
            let director = 'Bilinmeyen Yönetmen';
            let castHtml = '';
            
            if (creditsData) {
                const dirObj = creditsData.crew.find(c => c.job === 'Director');
                if (dirObj) director = dirObj.name;

                const topCast = creditsData.cast.slice(0, 5);
                topCast.forEach(actor => {
                    const actorImg = actor.profile_path ? `https://image.tmdb.org/t/p/w185${actor.profile_path}` : 'https://placehold.co/45x45/1A1A24/FFF?text=?';
                    castHtml += `
                        <div class="cast-item">
                            <img class="cast-img" src="${actorImg}" alt="${actor.name}">
                            <div>
                                <div class="cast-name">${actor.name}</div>
                                <div class="cast-character">${actor.character}</div>
                            </div>
                        </div>
                    `;
                });
            }

            if(castHtml === '') castHtml = '<p style="color:#6B7280; font-size:0.9rem;">Oyuncu bilgisi bulunamadı.</p>';

            // Fragman Ayıklama - Buton Modu (Yeni Sayfa)
            let trailerHtml = '<p style="color:#6B7280; font-size:0.9rem;">Fragman önizlemesi mevcut değil.</p>';
            if (videosData && videosData.results) {
                const trailer = videosData.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                if (trailer) {
                    trailerHtml = `
                        <a href="https://www.youtube.com/watch?v=${trailer.key}" target="_blank" rel="noopener noreferrer" class="trailer-link-btn">
                            <span class="material-icons-round">open_in_new</span> Fragmanı YouTube'da İzle
                        </a>
                    `;
                }
            }

            detailsDynamicContent.innerHTML = `
                <div class="details-hero" style="background-image: url('${backdrop}');">
                    <div class="details-hero-content">
                        <img class="details-poster" src="${poster}" alt="${title}">
                        <div class="details-meta">
                            <h1 class="details-title">${title}</h1>
                            <div class="details-sub-meta">
                                <span class="details-rating"><span class="material-icons-round" style="font-size:16px;">star</span> ${rating}</span>
                                <span>•</span>
                                <span>${releaseYear}</span>
                                <span>•</span>
                                <span>Yönetmen: <strong>${director}</strong></span>
                            </div>
                            <button class="play-now-btn" id="details-play-btn">
                                <span class="material-icons-round">play_arrow</span> ŞİMDİ İZLE
                            </button>
                        </div>
                    </div>
                </div>
                <div class="details-body">
                    <div class="info-section">
                        <h3>Özet / Konu</h3>
                        <p>${overview}</p>
                        <br>
                        <h3>Fragman & Önizleme</h3>
                        ${trailerHtml}
                    </div>
                    <div class="info-section">
                        <h3>Oyuncular</h3>
                        <div class="cast-list">
                            ${castHtml}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('details-play-btn').addEventListener('click', () => {
                playVideo(movie.url, title, poster);
            });
        }

        function playVideo(url, title, logoUrl) {
            playerContainer.style.display = 'block';
            currentTitle.textContent = title;
            ambientBg.style.backgroundImage = 'none';

            loaderOverlay.style.display = 'flex';
            loaderOverlay.style.opacity = '1';

            playerIframe.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms allow-presentation");
            playerIframe.src = url; 
        }
    </script>
</body>
</html>
